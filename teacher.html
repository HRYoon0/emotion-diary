<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>감정일기 - 교사용 📊</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F0F4F8;
      --card: #FFFFFF;
      --primary: #6C5CE7;
      --primary-light: #E8E5FF;
      --secondary: #00B894;
      --danger: #FF6B6B;
      --text: #2D3436;
      --text-light: #636E72;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --radius: 16px;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== 로그인 ===== */
    .login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
      background: linear-gradient(135deg, #E8E5FF 0%, #F0F4F8 50%, #D5F5E3 100%);
    }
    .login-box {
      background: white; border-radius: var(--radius); padding: 40px;
      box-shadow: var(--shadow); max-width: 400px; width: 100%; text-align: center;
    }
    .login-box h2 { font-size: 1.8rem; margin-bottom: 8px; }
    .login-box .emoji-big { font-size: 3.5rem; display: block; margin-bottom: 16px; }
    .login-box p { color: var(--text-light); margin-bottom: 24px; }

    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { font-weight: 700; font-size: 0.9rem; display: block; margin-bottom: 6px; }
    .form-group input, .form-group select {
      width: 100%; padding: 12px 16px; border: 2px solid #E0E0E0;
      border-radius: 12px; font-size: 1rem; font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }

    .btn-primary {
      width: 100%; padding: 14px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, #6C5CE7, #A29BFE);
      color: white; font-size: 1.1rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: transform 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); }

    .login-links { margin-top: 16px; }
    .login-links a { color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: 500; }

    .error-msg {
      background: #FFE0E0; color: #D63031; padding: 10px; border-radius: 10px;
      font-size: 0.85rem; margin-bottom: 16px; display: none;
    }

    /* ===== 헤더 ===== */
    .header {
      background: linear-gradient(135deg, #6C5CE7, #A29BFE);
      padding: 20px; text-align: center; color: white; position: relative;
    }
    .header h1 { font-size: 1.6rem; font-weight: 900; }
    .header .subtitle { font-size: 0.85rem; opacity: 0.9; margin-top: 4px; }
    .btn-logout {
      position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.25); border: none; color: white;
      padding: 6px 16px; border-radius: 12px; cursor: pointer; font-size: 0.85rem;
    }

    /* ===== 컨테이너 ===== */
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

    /* ===== 필터 바 ===== */
    .filter-bar {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;
      background: white; border-radius: var(--radius); padding: 16px;
      box-shadow: var(--shadow); align-items: flex-end;
    }
    .filter-group { flex: 1; min-width: 120px; }
    .filter-group label { font-size: 0.8rem; font-weight: 700; display: block; margin-bottom: 4px; color: var(--text-light); }
    .filter-group select, .filter-group input {
      width: 100%; padding: 10px; border: 2px solid #E0E0E0;
      border-radius: 10px; font-size: 0.9rem; font-family: inherit;
    }
    .btn-filter {
      padding: 10px 24px; border: none; border-radius: 10px;
      background: var(--primary); color: white; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }

    /* ===== 통계 카드 ===== */
    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px; margin-bottom: 20px;
    }
    .stat-card {
      background: white; border-radius: var(--radius); padding: 20px;
      text-align: center; box-shadow: var(--shadow);
    }
    .stat-card .stat-emoji { font-size: 2rem; margin-bottom: 8px; }
    .stat-card .stat-value { font-size: 1.8rem; font-weight: 900; }
    .stat-card .stat-label { font-size: 0.8rem; color: var(--text-light); margin-top: 4px; }

    /* ===== 카드 ===== */
    .card {
      background: white; border-radius: var(--radius); padding: 24px;
      box-shadow: var(--shadow); margin-bottom: 20px;
    }
    .card h3 { font-size: 1.1rem; margin-bottom: 16px; color: var(--text); }

    /* ===== 감정 분포 차트 ===== */
    .emotion-bar-chart { display: flex; flex-direction: column; gap: 8px; }
    .bar-row {
      display: flex; align-items: center; gap: 10px;
    }
    .bar-label { width: 80px; font-size: 0.85rem; font-weight: 500; text-align: right; }
    .bar-track {
      flex: 1; height: 28px; background: #F0F0F0; border-radius: 14px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 14px; transition: width 0.5s ease;
      display: flex; align-items: center; padding-left: 10px;
      font-size: 0.75rem; font-weight: 700; color: white; min-width: fit-content;
    }
    .bar-count { width: 30px; text-align: center; font-size: 0.85rem; font-weight: 700; }

    /* ===== 학생별 기록 테이블 ===== */
    .records-table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      font-size: 0.9rem;
    }
    .records-table thead th {
      background: #F8F9FA; padding: 12px; text-align: left;
      font-weight: 700; color: var(--text-light); font-size: 0.8rem;
      border-bottom: 2px solid #E0E0E0;
    }
    .records-table tbody td {
      padding: 12px; border-bottom: 1px solid #F0F0F0;
      vertical-align: middle;
    }
    .records-table tbody tr:hover { background: #FAFAFA; }
    .emotion-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 10px; font-size: 0.85rem; font-weight: 500;
    }

    .no-records { text-align: center; padding: 40px; color: var(--text-light); }
    .no-records .emoji { font-size: 3rem; margin-bottom: 10px; }

    .loading { text-align: center; padding: 30px; }
    .spinner {
      display: inline-block; width: 40px; height: 40px;
      border: 4px solid #E0E0E0; border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== 반응형 ===== */
    @media (max-width: 600px) {
      .filter-bar { flex-direction: column; }
      .filter-group { min-width: 100%; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .records-table { font-size: 0.8rem; }
      .records-table thead th, .records-table tbody td { padding: 8px; }
    }
  </style>
</head>
<body>

<!-- ===== 로그인 화면 ===== -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <span class="emoji-big">👨‍🏫</span>
    <h2>교사용 대시보드</h2>
    <p>학생들의 감정 기록을 확인합니다</p>
    <div id="loginError" class="error-msg"></div>
    <div class="form-group">
      <label>교사 비밀번호</label>
      <input type="password" id="teacherPw" placeholder="비밀번호를 입력하세요">
    </div>
    <button class="btn-primary" onclick="teacherLogin()">로그인</button>
    <div class="login-links">
      <a href="index.html">← 학생 로그인으로</a>
    </div>
  </div>
</div>

<!-- ===== 메인 화면 ===== -->
<div id="mainScreen" style="display:none;">
  <div class="header">
    <h1>📊 감정일기 대시보드</h1>
    <div class="subtitle">학생들의 마음을 살펴보세요</div>
    <button class="btn-logout" onclick="teacherLogout()">로그아웃</button>
  </div>

  <div class="container">
    <!-- 필터 -->
    <div class="filter-bar">
      <div class="filter-group">
        <label>반</label>
        <select id="filterClass">
          <option value="">전체</option>
          <option value="1">1반</option>
          <option value="2">2반</option>
          <option value="3">3반</option>
          <option value="4">4반</option>
          <option value="5">5반</option>
          <option value="6">6반</option>
        </select>
      </div>
      <div class="filter-group">
        <label>날짜</label>
        <input type="date" id="filterDate">
      </div>
      <div class="filter-group">
        <label>교시</label>
        <select id="filterPeriod">
          <option value="">전체</option>
          <option value="1">1교시</option>
          <option value="2">2교시</option>
          <option value="3">3교시</option>
          <option value="4">4교시</option>
          <option value="5">5교시</option>
          <option value="6">6교시</option>
          <option value="쉬는시간">쉬는시간</option>
          <option value="점심">점심</option>
        </select>
      </div>
      <button class="btn-filter" onclick="loadDashboard()">조회</button>
    </div>

    <!-- 통계 -->
    <div class="stats-row" id="statsRow"></div>

    <!-- 감정 분포 -->
    <div class="card">
      <h3>📈 감정 분포</h3>
      <div class="emotion-bar-chart" id="emotionChart"></div>
    </div>

    <!-- 기록 테이블 -->
    <div class="card">
      <h3>📋 상세 기록</h3>
      <div id="recordsTable"></div>
    </div>
  </div>
</div>

<script>
// HTML 이스케이프 (XSS 방지)
function escapeHtml(str) {
  if (!str) return '';
  var div = document.createElement('div');
  div.textContent = str;
  return div.textContent;
}

// 안전한 DOM 요소 생성 헬퍼
function createElement(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(function(pair) {
      var key = pair[0], val = pair[1];
      if (key === 'textContent') el.textContent = val;
      else if (key === 'className') el.className = val;
      else if (key === 'style' && typeof val === 'object') Object.assign(el.style, val);
      else if (key.startsWith('on')) el.addEventListener(key.slice(2).toLowerCase(), val);
      else el.setAttribute(key, val);
    });
  }
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(function(child) {
      if (typeof child === 'string') el.appendChild(document.createTextNode(child));
      else if (child) el.appendChild(child);
    });
  }
  return el;
}

var EMOTIONS = [
  { name: '행복', emoji: '😊', color: '#FFD93D' },
  { name: '신남', emoji: '🤩', color: '#FF6B6B' },
  { name: '평온', emoji: '😌', color: '#74B9FF' },
  { name: '감사', emoji: '🥰', color: '#FD79A8' },
  { name: '기대', emoji: '🤗', color: '#FFEAA7' },
  { name: '뿌듯', emoji: '💪', color: '#55E6C1' },
  { name: '걱정', emoji: '😟', color: '#A29BFE' },
  { name: '슬픔', emoji: '😢', color: '#74B9FF' },
  { name: '화남', emoji: '😡', color: '#FF6348' },
  { name: '피곤', emoji: '😴', color: '#B2BEC3' },
  { name: '무서움', emoji: '😨', color: '#DFE6E9' },
  { name: '외로움', emoji: '🥺', color: '#DCDDE1' },
  { name: '답답', emoji: '😤', color: '#E17055' },
  { name: '부끄러움', emoji: '😳', color: '#FAB1A0' },
  { name: '놀람', emoji: '😲', color: '#FDCB6E' },
  { name: '그냥그냥', emoji: '😐', color: '#B2BEC3' },
];

var API_URL = localStorage.getItem('emotion_api_url') || 'https://script.google.com/macros/s/AKfycbwdYIENv0qZUqNUklQYM__gjBiri7BttV1nVXYmEBPsx-lRA18NGM27MpjipjBUj_Bs/exec';
var isLoggedIn = sessionStorage.getItem('teacher_logged_in') === 'true';

window.addEventListener('DOMContentLoaded', function() {
  if (!API_URL) {
    alert('먼저 학생 페이지(index.html)에서 API URL을 설정해주세요.');
    return;
  }
  if (isLoggedIn) showDashboard();

  document.getElementById('filterDate').value = getToday();
});

function getToday() {
  var d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

// ===== 교사 로그인 =====
async function teacherLogin() {
  var pw = document.getElementById('teacherPw').value;
  if (!pw) return;

  try {
    var url = API_URL + '?action=teacherLogin&password=' + encodeURIComponent(pw);
    var res = await fetch(url);
    var data = await res.json();

    if (data.success) {
      sessionStorage.setItem('teacher_logged_in', 'true');
      isLoggedIn = true;
      showDashboard();
    } else {
      var el = document.getElementById('loginError');
      el.textContent = data.message;
      el.style.display = 'block';
    }
  } catch (err) {
    var el = document.getElementById('loginError');
    el.textContent = '서버 연결 실패. API URL을 확인해주세요.';
    el.style.display = 'block';
  }
}

function teacherLogout() {
  sessionStorage.removeItem('teacher_logged_in');
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  loadDashboard();
}

// ===== 대시보드 로드 =====
async function loadDashboard() {
  var classNum = document.getElementById('filterClass').value;
  var date = document.getElementById('filterDate').value;
  var period = document.getElementById('filterPeriod').value;

  // 기록 불러오기
  var tableDiv = document.getElementById('recordsTable');
  tableDiv.replaceChildren();
  tableDiv.appendChild(createElement('div', { className: 'loading' }, [
    createElement('div', { className: 'spinner' }),
    createElement('p', { textContent: '불러오는 중...' }),
  ]));

  try {
    var url = API_URL + '?action=getClassRecords&classNum=' + encodeURIComponent(classNum) +
      '&date=' + encodeURIComponent(date);
    var res = await fetch(url);
    var data = await res.json();

    if (!data.success) return;

    var records = data.records;

    // 교시 필터
    if (period) {
      records = records.filter(function(r) { return r.period === period; });
    }

    // 통계 렌더링
    renderStats(records);
    // 차트 렌더링
    renderChart(records);
    // 테이블 렌더링
    renderTable(records);

  } catch (err) {
    tableDiv.replaceChildren();
    tableDiv.appendChild(createElement('div', { className: 'no-records' }, [
      createElement('div', { className: 'emoji', textContent: '⚠️' }),
      createElement('p', { textContent: '데이터를 불러올 수 없습니다.' }),
    ]));
  }
}

// ===== 통계 =====
function renderStats(records) {
  var container = document.getElementById('statsRow');
  container.replaceChildren();

  var total = records.length;
  var students = new Set(records.map(function(r) { return r.classNum + '-' + r.studentNum; })).size;

  // 감정별 카운트
  var emotionCounts = {};
  records.forEach(function(r) {
    emotionCounts[r.emotion] = (emotionCounts[r.emotion] || 0) + 1;
  });

  var topEmotion = '';
  var topCount = 0;
  Object.entries(emotionCounts).forEach(function(pair) {
    if (pair[1] > topCount) { topEmotion = pair[0]; topCount = pair[1]; }
  });

  // 긍정 감정 비율
  var positiveEmotions = ['행복', '신남', '평온', '감사', '기대', '뿌듯'];
  var positiveCount = records.filter(function(r) { return positiveEmotions.indexOf(r.emotion) >= 0; }).length;
  var positiveRate = total > 0 ? Math.round(positiveCount / total * 100) : 0;

  var topEmo = EMOTIONS.find(function(e) { return e.name === topEmotion; }) || { emoji: '-' };

  var stats = [
    { emoji: '📝', value: total, label: '총 기록 수' },
    { emoji: '👤', value: students, label: '참여 학생 수' },
    { emoji: topEmo.emoji, value: escapeHtml(topEmotion) || '-', label: '가장 많은 감정' },
    { emoji: '😊', value: positiveRate + '%', label: '긍정 감정 비율' },
  ];

  stats.forEach(function(s) {
    container.appendChild(createElement('div', { className: 'stat-card' }, [
      createElement('div', { className: 'stat-emoji', textContent: s.emoji }),
      createElement('div', { className: 'stat-value', textContent: String(s.value) }),
      createElement('div', { className: 'stat-label', textContent: s.label }),
    ]));
  });
}

// ===== 감정 분포 차트 =====
function renderChart(records) {
  var container = document.getElementById('emotionChart');
  container.replaceChildren();

  if (records.length === 0) {
    container.appendChild(createElement('div', { className: 'no-records' }, [
      createElement('p', { textContent: '데이터가 없습니다' }),
    ]));
    return;
  }

  var counts = {};
  records.forEach(function(r) {
    counts[r.emotion] = (counts[r.emotion] || 0) + 1;
  });

  var sorted = Object.entries(counts).sort(function(a, b) { return b[1] - a[1]; });
  var maxCount = sorted.length > 0 ? sorted[0][1] : 1;

  sorted.forEach(function(pair) {
    var name = pair[0], count = pair[1];
    var emo = EMOTIONS.find(function(e) { return e.name === name; }) || { emoji: '❓', color: '#CCC' };
    var pct = Math.round(count / maxCount * 100);

    var barFill = createElement('div', { className: 'bar-fill' });
    barFill.style.width = pct + '%';
    barFill.style.background = emo.color;
    barFill.textContent = count + '건';

    container.appendChild(createElement('div', { className: 'bar-row' }, [
      createElement('div', { className: 'bar-label', textContent: emo.emoji + ' ' + escapeHtml(name) }),
      createElement('div', { className: 'bar-track' }, [barFill]),
      createElement('div', { className: 'bar-count', textContent: String(count) }),
    ]));
  });
}

// ===== 기록 테이블 =====
function renderTable(records) {
  var container = document.getElementById('recordsTable');
  container.replaceChildren();

  if (records.length === 0) {
    container.appendChild(createElement('div', { className: 'no-records' }, [
      createElement('div', { className: 'emoji', textContent: '📭' }),
      createElement('p', { textContent: '해당 조건의 기록이 없습니다' }),
    ]));
    return;
  }

  var table = createElement('table', { className: 'records-table' });

  // 헤더
  var thead = createElement('thead');
  var headerRow = createElement('tr');
  ['시간', '반', '번호', '이름', '교시', '감정', '강도', '메모'].forEach(function(h) {
    headerRow.appendChild(createElement('th', { textContent: h }));
  });
  thead.appendChild(headerRow);
  table.appendChild(thead);

  // 바디
  var tbody = createElement('tbody');
  records.sort(function(a, b) {
    return a.timestamp > b.timestamp ? -1 : 1;
  });

  records.forEach(function(r) {
    var emo = EMOTIONS.find(function(e) { return e.name === r.emotion; }) || { emoji: '❓', color: '#CCC' };
    var row = createElement('tr');

    var timeText = r.timestamp ? r.timestamp.split(' ')[1] || r.timestamp : '';
    row.appendChild(createElement('td', { textContent: timeText }));
    row.appendChild(createElement('td', { textContent: escapeHtml(r.classNum) + '반' }));
    row.appendChild(createElement('td', { textContent: escapeHtml(r.studentNum) + '번' }));
    row.appendChild(createElement('td', { textContent: escapeHtml(r.name) }));
    row.appendChild(createElement('td', { textContent: r.period ? r.period + '교시' : '' }));

    var badge = createElement('span', {
      className: 'emotion-badge',
      style: { background: emo.color + '33' },
      textContent: emo.emoji + ' ' + escapeHtml(r.emotion),
    });
    var emotionTd = createElement('td');
    emotionTd.appendChild(badge);
    row.appendChild(emotionTd);

    row.appendChild(createElement('td', { textContent: r.intensity + '/5' }));
    row.appendChild(createElement('td', { textContent: escapeHtml(r.memo) || '-' }));

    tbody.appendChild(row);
  });

  table.appendChild(tbody);
  container.appendChild(table);
}
</script>

</body>
</html>
